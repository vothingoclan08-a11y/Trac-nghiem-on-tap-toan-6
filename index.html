<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Câu Ôn Tập Toán 6</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Canvas Confetti cho hiệu ứng pháo hoa -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            min-height: 100vh;
        }

        /* Hiệu ứng rung khi chọn sai */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        .wrong-answer {
            animation: shake 0.4s ease-in-out;
            background-color: #fee2e2 !important; /* red-100 */
            border-color: #ef4444 !important; /* red-500 */
            color: #991b1b !important; /* red-800 */
        }

        .wrong-answer span:first-child {
            background-color: #f87171 !important;
            color: white !important;
        }

        .correct-answer {
            background-color: #dcfce7 !important; /* green-100 */
            border-color: #22c55e !important; /* green-500 */
            color: #166534 !important; /* green-800 */
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }

        .correct-answer span:first-child {
            background-color: #22c55e !important;
            color: white !important;
        }

        .disabled-option {
            pointer-events: none;
            opacity: 0.5;
            filter: grayscale(100%);
        }

        /* Giao diện thanh tiến trình mượt mà */
        #progress-bar {
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 md:p-8">

    <!-- Khu vực Quiz chính -->
    <div id="quiz-container" class="bg-white rounded-3xl shadow-2xl w-full max-w-4xl overflow-hidden relative">
        
        <!-- Header & Progress -->
        <div class="bg-blue-600 p-6 text-white text-center relative">
            <h1 class="text-3xl font-bold mb-2"><i class="fa-solid fa-graduation-cap mr-2"></i> Ôn Tập Tổng Hợp Toán 6</h1>
            <p class="text-blue-100 font-medium">Thử thách 100 câu hỏi trắc nghiệm lý thuyết</p>
            
            <div class="absolute bottom-0 left-0 w-full bg-blue-800 h-2">
                <div id="progress-bar" class="bg-yellow-400 h-full w-0"></div>
            </div>
        </div>

        <!-- Question Area -->
        <div class="p-6 md:p-10">
            <div class="flex justify-between items-center mb-6">
                <span id="q-num" class="bg-blue-100 text-blue-800 px-4 py-1.5 rounded-full font-bold text-sm uppercase tracking-wider">
                    Câu 1 / 100
                </span>
            </div>

            <h2 id="q-text" class="text-2xl md:text-3xl font-extrabold text-gray-800 mb-8 leading-snug">
                <!-- Câu hỏi hiển thị ở đây -->
            </h2>

            <!-- Options Grid -->
            <div id="options" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Các nút đáp án sẽ được JS tạo ra ở đây -->
            </div>

            <!-- Nút Tiếp Theo (Mặc định ẩn) -->
            <button id="next-btn" onclick="nextQuestion()" class="hidden mt-8 w-full bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white font-bold py-4 rounded-xl text-xl transition transform hover:scale-[1.02] shadow-lg flex justify-center items-center gap-2">
                Câu tiếp theo <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <!-- Màn hình kết thúc -->
    <div id="end-screen" class="hidden bg-white rounded-3xl shadow-2xl w-full max-w-2xl p-10 text-center">
        <i class="fa-solid fa-trophy text-6xl text-yellow-400 mb-6 drop-shadow-md"></i>
        <h1 class="text-4xl font-extrabold text-gray-800 mb-4">Hoàn Thành Xuất Sắc!</h1>
        <p class="text-xl text-gray-600 mb-8">Bạn đã chinh phục thành công 100 câu hỏi ôn tập Toán lớp 6. Kiến thức của bạn rất vững vàng!</p>
        <button onclick="location.reload()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl text-lg transition shadow-lg">
            <i class="fa-solid fa-rotate-right mr-2"></i> Làm lại từ đầu
        </button>
    </div>

    <script>
        // Danh sách 100 câu hỏi bao quát toàn bộ chương trình Toán 6
        const questions = [
            // Chương 1: Tập hợp & Số tự nhiên (1-20)
            { q: "Tập hợp các số tự nhiên được kí hiệu là?", o: ["N", "N*", "Z", "Q"], a: 0 },
            { q: "Tập hợp các số tự nhiên khác 0 được kí hiệu là?", o: ["N", "N*", "Z", "Q"], a: 1 },
            { q: "Cho tập hợp A = {1; 2; a; b}. Phần tử nào sau đây thuộc A?", o: ["3", "c", "b", "0"], a: 2 },
            { q: "Cách viết nào sau đây là SAI?", o: ["1 ∈ N", "0 ∈ N*", "5 ∈ N", "0 ∉ N*"], a: 1 },
            { q: "Số tự nhiên liền sau số 99 là?", o: ["98", "100", "101", "90"], a: 1 },
            { q: "Số tự nhiên liền trước số 1000 là?", o: ["999", "1001", "900", "99"], a: 0 },
            { q: "Hệ thập phân sử dụng bao nhiêu chữ số để ghi số?", o: ["9", "10", "11", "Vô số"], a: 1 },
            { q: "Trong số 2024, chữ số 2 ở hàng nghìn có giá trị là bao nhiêu?", o: ["2", "20", "200", "2000"], a: 3 },
            { q: "Số La Mã XIV tương ứng với số tự nhiên nào?", o: ["16", "14", "9", "11"], a: 1 },
            { q: "Số 9 được viết bằng số La Mã là?", o: ["IX", "XI", "VIV", "IIV"], a: 0 },
            { q: "Kết quả của phép tính 3<sup>2</sup> là?", o: ["6", "5", "9", "1"], a: 2 },
            { q: "Công thức nhân hai lũy thừa cùng cơ số (a<sup>m</sup> . a<sup>n</sup>) là?", o: ["a<sup>m+n</sup>", "a<sup>m.n</sup>", "a<sup>m-n</sup>", "a<sup>m:n</sup>"], a: 0 },
            { q: "Công thức chia hai lũy thừa cùng cơ số a khác 0 (a<sup>m</sup> : a<sup>n</sup>) là?", o: ["a<sup>m+n</sup>", "a<sup>m-n</sup>", "a<sup>m.n</sup>", "a<sup>m:n</sup>"], a: 1 },
            { q: "Mọi số tự nhiên a khác 0 thì a<sup>0</sup> bằng bao nhiêu?", o: ["0", "a", "1", "Không xác định"], a: 2 },
            { q: "Kết quả của phép tính 5<sup>3</sup> : 5 là?", o: ["5<sup>3</sup>", "5<sup>2</sup>", "5<sup>4</sup>", "1"], a: 1 },
            { q: "Thứ tự thực hiện phép tính trong biểu thức KHÔNG có dấu ngoặc là?", o: ["Cộng/Trừ -> Nhân/Chia -> Lũy thừa", "Nhân/Chia -> Cộng/Trừ -> Lũy thừa", "Lũy thừa -> Nhân/Chia -> Cộng/Trừ", "Tính từ phải sang trái"], a: 2 },
            { q: "Thứ tự thực hiện phép tính đối với biểu thức CÓ dấu ngoặc là?", o: ["() -> [] -> {}", "{} -> [] -> ()", "[] -> () -> {}", "() -> {} -> []"], a: 0 },
            { q: "Tính chất phân phối của phép nhân đối với phép cộng được viết là?", o: ["a(b+c) = ab + c", "a(b+c) = a+b+c", "a(b+c) = ab + ac", "a(b+c) = a.b.c"], a: 2 },
            { q: "Số nào sau đây là số nhỏ nhất có 3 chữ số khác nhau?", o: ["100", "101", "102", "123"], a: 2 },
            { q: "Để tính nhanh 99 + 35, ta có thể tách như thế nào?", o: ["(99 + 1) + 34", "(99 + 5) + 30", "100 + 35", "(99 - 1) + 36"], a: 0 },

            // Chương 2: Chia hết & Số nguyên tố (21-40)
            { q: "Nếu a = b.q (b ≠ 0) thì ta nói:", o: ["a chia hết cho b", "b chia hết cho a", "a là ước của b", "q là bội của a"], a: 0 },
            { q: "Dấu hiệu chia hết cho 2 là các số có chữ số tận cùng là?", o: ["0, 5", "1, 3, 5, 7, 9", "0, 2, 4, 6, 8", "Bất kì số nào"], a: 2 },
            { q: "Dấu hiệu chia hết cho 5 là các số có chữ số tận cùng là?", o: ["0 hoặc 2", "0 hoặc 5", "5", "Chữ số chẵn"], a: 1 },
            { q: "Dấu hiệu chia hết cho 3 là?", o: ["Chữ số tận cùng là 3", "Tổng các chữ số chia hết cho 3", "Tận cùng là 0 hoặc 3", "Tổng các chữ số chia hết cho 9"], a: 1 },
            { q: "Dấu hiệu chia hết cho 9 là?", o: ["Chữ số tận cùng là 9", "Tổng các chữ số chia hết cho 3", "Tổng các chữ số chia hết cho 9", "Tận cùng là 0 hoặc 9"], a: 2 },
            { q: "Số nào sau đây chia hết cho cả 2 và 5?", o: ["125", "252", "2020", "105"], a: 2 },
            { q: "Số nguyên tố là số tự nhiên lớn hơn 1 và có bao nhiêu ước?", o: ["Chỉ có 1 ước", "Chỉ có 2 ước là 1 và chính nó", "Có nhiều hơn 2 ước", "Không có ước nào"], a: 1 },
            { q: "Hợp số là số tự nhiên lớn hơn 1 và có bao nhiêu ước?", o: ["Nhiều hơn 2 ước", "Đúng 2 ước", "Chỉ có 1 ước", "Vô số ước"], a: 0 },
            { q: "Số nguyên tố chẵn duy nhất là số nào?", o: ["4", "0", "2", "6"], a: 2 },
            { q: "Số 1 là số nguyên tố hay hợp số?", o: ["Là số nguyên tố", "Là hợp số", "Không là số nguyên tố, không là hợp số", "Vừa là số nguyên tố vừa là hợp số"], a: 2 },
            { q: "Phân tích số 12 ra thừa số nguyên tố, kết quả là?", o: ["2 . 6", "3 . 4", "2<sup>2</sup> . 3", "12 . 1"], a: 2 },
            { q: "ƯCLN(a, b) là kí hiệu của?", o: ["Bội chung nhỏ nhất", "Ước chung lớn nhất", "Ước chung nhỏ nhất", "Bội chung lớn nhất"], a: 1 },
            { q: "BCNN(a, b) là kí hiệu của?", o: ["Ước chung lớn nhất", "Bội chung lớn nhất", "Bội chung nhỏ nhất", "Ước chung nhỏ nhất"], a: 2 },
            { q: "Hai số nguyên tố cùng nhau là hai số có ƯCLN bằng bao nhiêu?", o: ["0", "1", "2", "Chính nó"], a: 1 },
            { q: "Trong các số sau, số nào là số nguyên tố?", o: ["9", "15", "11", "21"], a: 2 },
            { q: "Trong các số sau, số nào là hợp số?", o: ["13", "17", "19", "15"], a: 3 },
            { q: "ƯCLN(15, 30) bằng bao nhiêu?", o: ["5", "15", "30", "1"], a: 1 },
            { q: "BCNN(2, 3) bằng bao nhiêu?", o: ["1", "5", "6", "12"], a: 2 },
            { q: "Tập hợp các ước chung của 4 và 6 là?", o: ["{1; 2}", "{1; 2; 4}", "{1; 2; 3}", "{2}"], a: 0 },
            { q: "Một số chia hết cho cả 2 và 3 thì số đó chắc chắn chia hết cho?", o: ["5", "6", "9", "4"], a: 1 },

            // Chương 3: Số nguyên (41-60)
            { q: "Tập hợp các số nguyên được kí hiệu là?", o: ["N", "Z", "Q", "R"], a: 1 },
            { q: "Tập hợp số nguyên Z bao gồm những số nào?", o: ["Số nguyên âm và số 0", "Số 0 và số nguyên dương", "Số nguyên âm và số nguyên dương", "Số nguyên âm, số 0 và số nguyên dương"], a: 3 },
            { q: "Số đối của số nguyên a được kí hiệu là?", o: ["a'", "|a|", "-a", "1/a"], a: 2 },
            { q: "Số đối của -15 là?", o: ["-15", "0", "15", "1/15"], a: 2 },
            { q: "Trên trục số nằm ngang, các điểm biểu diễn số nguyên âm nằm ở đâu so với điểm 0?", o: ["Bên phải", "Bên trái", "Trùng với điểm 0", "Nằm trên điểm 0"], a: 1 },
            { q: "Khẳng định nào sau đây ĐÚNG?", o: ["-5 > -2", "-10 > 0", "0 > -3", "-4 = 4"], a: 2 },
            { q: "Tổng của hai số nguyên đối nhau luôn bằng?", o: ["1", "-1", "0", "Chính nó"], a: 2 },
            { q: "Muốn cộng hai số nguyên âm, ta làm thế nào?", o: ["Cộng hai số đối của chúng", "Cộng hai số đối và đặt dấu '-' trước kết quả", "Trừ hai số đối của chúng", "Giữ nguyên dấu và lấy số lớn trừ số bé"], a: 1 },
            { q: "Kết quả của (-5) + (-4) là?", o: ["-1", "1", "9", "-9"], a: 3 },
            { q: "Muốn cộng hai số nguyên khác dấu, ta lấy số lớn trừ đi số bé rồi làm gì?", o: ["Đặt dấu của số lớn hơn trước kết quả", "Đặt dấu âm trước kết quả", "Đặt dấu dương trước kết quả", "Cộng thêm 0"], a: 0 },
            { q: "Kết quả của phép tính (-10) + 6 là?", o: ["-16", "16", "-4", "4"], a: 2 },
            { q: "Quy tắc dấu ngoặc: Khi bỏ dấu ngoặc có dấu '-' đằng trước, ta phải?", o: ["Giữ nguyên dấu các số hạng", "Đổi dấu tất cả các số hạng trong ngoặc", "Chỉ đổi dấu số hạng đầu tiên", "Xóa dấu các số hạng"], a: 1 },
            { q: "Phép trừ hai số nguyên a - b được hiểu là?", o: ["a + b", "b + (-a)", "a + (-b)", "-a - b"], a: 2 },
            { q: "Kết quả của phép tính 5 - (-3) là?", o: ["2", "8", "-2", "-8"], a: 1 },
            { q: "Tích của hai số nguyên KHÁC dấu luôn mang dấu gì?", o: ["Dương (+)", "Âm (-)", "Không có dấu", "Phụ thuộc số lớn hơn"], a: 1 },
            { q: "Tích của hai số nguyên CÙNG dấu luôn mang dấu gì?", o: ["Dương (+)", "Âm (-)", "Không có dấu", "Phụ thuộc số lớn hơn"], a: 0 },
            { q: "Kết quả của (-4) . (-5) là?", o: ["-20", "20", "-9", "9"], a: 1 },
            { q: "Kết quả của (-6) . 2 là?", o: ["-12", "12", "-4", "8"], a: 0 },
            { q: "Bội của -3 trong các số sau là?", o: ["1", "-2", "9", "5"], a: 2 },
            { q: "Ước của -7 trong các số sau là?", o: ["-14", "14", "1", "3"], a: 2 },

            // Chương 4: Hình phẳng trong thực tiễn (61-75)
            { q: "Tam giác đều có đặc điểm gì về cạnh?", o: ["Có 2 cạnh bằng nhau", "Có 3 cạnh bằng nhau", "Không có cạnh nào bằng nhau", "Có 3 cạnh song song"], a: 1 },
            { q: "Mỗi góc trong tam giác đều có số đo bằng bao nhiêu?", o: ["90 độ", "60 độ", "45 độ", "120 độ"], a: 1 },
            { q: "Hình vuông có đặc điểm gì về góc?", o: ["4 góc nhọn", "4 góc tù", "4 góc vuông", "2 góc vuông, 2 góc nhọn"], a: 2 },
            { q: "Hai đường chéo của hình vuông có tính chất gì?", o: ["Chỉ bằng nhau", "Chỉ vuông góc", "Bằng nhau và vuông góc với nhau", "Song song với nhau"], a: 2 },
            { q: "Lục giác đều được ghép lại bởi bao nhiêu tam giác đều?", o: ["4", "5", "6", "8"], a: 2 },
            { q: "Hình chữ nhật có các cạnh đối như thế nào?", o: ["Vuông góc với nhau", "Song song và bằng nhau", "Cắt nhau", "Không bằng nhau"], a: 1 },
            { q: "Hình bình hành có hai đường chéo bằng nhau là hình gì?", o: ["Hình thoi", "Hình thang", "Hình chữ nhật", "Hình lục giác"], a: 2 },
            { q: "Hình thoi có đặc điểm gì về cạnh?", o: ["Có 4 cạnh bằng nhau", "Có 2 cạnh bằng nhau", "Chỉ có các cạnh đối bằng nhau", "Các cạnh không bằng nhau"], a: 0 },
            { q: "Hai đường chéo của hình thoi có tính chất gì?", o: ["Bằng nhau", "Vuông góc với nhau tại trung điểm mỗi đường", "Song song với nhau", "Không cắt nhau"], a: 1 },
            { q: "Hình thang có hai cạnh bên song song là hình gì?", o: ["Hình chữ nhật", "Hình bình hành", "Hình vuông", "Hình thoi"], a: 1 },
            { q: "Hình thang cân có hai cạnh bên như thế nào?", o: ["Song song", "Vuông góc", "Bằng nhau", "Khác nhau"], a: 2 },
            { q: "Hai đường chéo của hình thang cân có tính chất gì?", o: ["Vuông góc", "Bằng nhau", "Cắt nhau tại trung điểm", "Song song"], a: 1 },
            { q: "Đường chéo chính của lục giác đều có tính chất gì?", o: ["Bằng nhau", "Vuông góc với nhau", "Song song với nhau", "Không cắt nhau"], a: 0 },
            { q: "Chu vi hình chữ nhật có chiều dài a, chiều rộng b là?", o: ["a + b", "a . b", "2.(a + b)", "2.a.b"], a: 2 },
            { q: "Diện tích hình vuông cạnh a là?", o: ["4.a", "a<sup>2</sup>", "2.a", "a + a"], a: 1 },

            // Chương 5: Tính đối xứng (76-80)
            { q: "Hình nào sau đây CÓ trục đối xứng?", o: ["Hình bình hành", "Hình thang vuông", "Hình tròn", "Hình tam giác nhọn bất kì"], a: 2 },
            { q: "Hình chữ nhật có bao nhiêu trục đối xứng?", o: ["1", "2", "3", "4"], a: 1 },
            { q: "Hình vuông có bao nhiêu trục đối xứng?", o: ["2", "4", "Vô số", "Không có"], a: 1 },
            { q: "Hình bình hành có tâm đối xứng là điểm nào?", o: ["Trung điểm một cạnh", "Một đỉnh của hình", "Giao điểm của hai đường chéo", "Không có tâm đối xứng"], a: 2 },
            { q: "Chữ cái in hoa nào sau đây có tâm đối xứng?", o: ["Chữ A", "Chữ M", "Chữ H", "Chữ C"], a: 2 },

            // Chương 6: Phân số (81-95)
            { q: "Phân số a/b (a, b ∈ Z) xác định khi nào?", o: ["a ≠ 0", "b ≠ 0", "a = 0", "a > b"], a: 1 },
            { q: "Hai phân số a/b và c/d bằng nhau khi nào?", o: ["a.c = b.d", "a.b = c.d", "a.d = b.c", "a+d = b+c"], a: 2 },
            { q: "Khi nhân cả tử và mẫu của một phân số với cùng một số nguyên khác 0, ta được?", o: ["Một phân số lớn hơn", "Một phân số nhỏ hơn", "Một phân số bằng phân số đã cho", "Phân số nghịch đảo"], a: 2 },
            { q: "Phân số tối giản là phân số có ƯCLN của tử và mẫu là bao nhiêu?", o: ["2", "0", "1 hoặc -1", "Bằng chính tử số"], a: 2 },
            { q: "Để quy đồng mẫu nhiều phân số, ta thường lấy mẫu chung là?", o: ["ƯCLN của các mẫu", "BCNN của các mẫu", "Tổng các mẫu", "Tích các tử"], a: 1 },
            { q: "Muốn cộng hai phân số cùng mẫu, ta làm thế nào?", o: ["Cộng tử với tử, cộng mẫu với mẫu", "Cộng mẫu với mẫu, giữ nguyên tử", "Cộng tử với tử, giữ nguyên mẫu", "Nhân chéo tử và mẫu"], a: 2 },
            { q: "Số đối của phân số a/b là?", o: ["b/a", "-a/b", "-b/-a", "a/-b"], a: 1 },
            { q: "Phân số nghịch đảo của phân số a/b (a, b ≠ 0) là?", o: ["-a/b", "b/a", "-b/a", "a/b"], a: 1 },
            { q: "Muốn nhân hai phân số, ta làm thế nào?", o: ["Nhân tử với tử, giữ nguyên mẫu", "Nhân tử với tử, nhân mẫu với mẫu", "Nhân chéo", "Quy đồng rồi cộng"], a: 1 },
            { q: "Muốn chia phân số a/b cho phân số c/d, ta làm thế nào?", o: ["Nhân a/b với c/d", "Nhân a/b với phân số nghịch đảo d/c", "Lấy tử chia tử, mẫu chia mẫu", "Cộng a/b với c/d"], a: 1 },
            { q: "Phân số thập phân là phân số có mẫu là?", o: ["Số chẵn", "Số lẻ", "Lũy thừa của 10", "Số nguyên tố"], a: 2 },
            { q: "Số thập phân gồm mấy phần?", o: ["Chỉ có phần nguyên", "Phần nguyên và phần thập phân", "Chỉ có phần thập phân", "Phần nguyên và phần phân số"], a: 1 },
            { q: "Kết quả làm tròn số 12,345 đến chữ số thập phân thứ nhất là?", o: ["12,3", "12,4", "12,34", "12"], a: 0 },
            { q: "Hỗn số $2\\frac{1}{3}$ được viết dưới dạng phân số là?", o: ["3/3", "5/3", "7/3", "2/3"], a: 2 },
            { q: "15% viết dưới dạng phân số tối giản là?", o: ["15/100", "3/20", "1/5", "3/10"], a: 1 },

            // Chương 7: Thống kê và Xác suất (96-100)
            { q: "Thông tin thu thập được như số liệu, chữ cái, hình ảnh... được gọi chung là gì?", o: ["Bảng", "Dữ liệu", "Xác suất", "Biểu đồ"], a: 1 },
            { q: "Để biểu diễn số liệu bằng hình ảnh, biểu tượng trực quan, ta thường dùng loại biểu đồ nào?", o: ["Biểu đồ cột", "Biểu đồ đoạn thẳng", "Biểu đồ tranh", "Biểu đồ hình quạt"], a: 2 },
            { q: "Khi tung một đồng xu hợp lệ, có bao nhiêu kết quả có thể xảy ra?", o: ["1", "2", "3", "4"], a: 1 },
            { q: "Khi gieo một con xúc xắc 6 mặt, kết quả nào sau đây là KHÔNG thể xảy ra?", o: ["Ra mặt 1 chấm", "Ra mặt 6 chấm", "Ra mặt 3 chấm", "Ra mặt 7 chấm"], a: 3 },
            { q: "Xác suất thực nghiệm của sự kiện A được tính bằng tỉ số giữa số lần sự kiện A xảy ra và?", o: ["Số lần thất bại", "100", "Tổng số lần thực hiện thí nghiệm", "Số lần tung đồng xu"], a: 2 }
        ];

        let currentQuestionIndex = 0;
        let isAnswered = false;

        const qNumEl = document.getElementById('q-num');
        const qTextEl = document.getElementById('q-text');
        const optionsContainer = document.getElementById('options');
        const nextBtn = document.getElementById('next-btn');
        const progressBar = document.getElementById('progress-bar');
        const quizContainer = document.getElementById('quiz-container');
        const endScreen = document.getElementById('end-screen');

        function initQuiz() {
            // Trộn thứ tự các lựa chọn trong mỗi câu để tránh học vẹt (Tuỳ chọn)
            // Khởi tạo câu hỏi đầu tiên
            renderQuestion();
        }

        function renderQuestion() {
            isAnswered = false;
            nextBtn.classList.add('hidden');
            
            const qData = questions[currentQuestionIndex];
            
            // Cập nhật UI
            qNumEl.innerText = `Câu ${currentQuestionIndex + 1} / ${questions.length}`;
            qTextEl.innerHTML = qData.q;
            
            // Cập nhật thanh tiến trình
            const progressPercent = (currentQuestionIndex / questions.length) * 100;
            progressBar.style.width = `${progressPercent}%`;

            // Xoá các tuỳ chọn cũ
            optionsContainer.innerHTML = '';

            const labels = ['A', 'B', 'C', 'D'];

            // Tạo các nút tuỳ chọn mới
            qData.o.forEach((optionText, index) => {
                const optBtn = document.createElement('div');
                optBtn.className = 'option-btn p-5 border-2 border-blue-100 rounded-2xl hover:bg-blue-50 transition-all cursor-pointer text-lg font-semibold flex items-center gap-4 bg-white shadow-sm';
                
                optBtn.innerHTML = `
                    <span class="bg-blue-100 text-blue-700 w-10 h-10 min-w-[40px] rounded-full flex items-center justify-center font-bold text-xl">${labels[index]}</span>
                    <span>${optionText}</span>
                `;

                optBtn.onclick = () => handleOptionClick(optBtn, index, qData.a);
                optionsContainer.appendChild(optBtn);
            });
        }

        function handleOptionClick(btnElement, selectedIndex, correctIndex) {
            if (isAnswered) return; // Nếu đã trả lời đúng thì không cho click nữa

            if (selectedIndex === correctIndex) {
                // TRẢ LỜI ĐÚNG
                isAnswered = true;
                btnElement.classList.add('correct-answer');
                btnElement.classList.remove('hover:bg-blue-50', 'border-blue-100');
                
                // Khoá các tuỳ chọn khác
                Array.from(optionsContainer.children).forEach(child => {
                    if (child !== btnElement) {
                        child.classList.add('disabled-option');
                    }
                });

                // Hiển thị nút Next
                nextBtn.classList.remove('hidden');

                // Bắn pháo hoa
                fireConfetti();
            } else {
                // TRẢ LỜI SAI
                // Thêm class rung và đỏ, sau đó xoá class rung để có thể rung tiếp nếu click lại
                btnElement.classList.remove('hover:bg-blue-50', 'border-blue-100');
                btnElement.classList.add('wrong-answer');
                
                // Xoá animation sau khi chạy xong để có thể trigger lại
                setTimeout(() => {
                    btnElement.style.animation = 'none';
                    btnElement.offsetHeight; /* trigger reflow */
                    btnElement.style.animation = null; 
                }, 400);
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            } else {
                showEndScreen();
            }
        }

        function showEndScreen() {
            quizContainer.classList.add('hidden');
            endScreen.classList.remove('hidden');
            
            // Pháo hoa tưng bừng khi hoàn thành
            const duration = 3000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#26ccff', '#a25afd', '#ff5e7e', '#88ff5a', '#fcff42']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#26ccff', '#a25afd', '#ff5e7e', '#88ff5a', '#fcff42']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        function fireConfetti() {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6']
            });
        }

        // Chạy quiz khi load trang
        window.onload = initQuiz;
    </script>
</body>
</html>
